<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G2 Media Controller</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        padding: 16px;
        font-size: 14px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #fff;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Status section */
      #status-section { margin-bottom: 20px; }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid #1a1a1a;
      }
      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-green { background: #22c55e; }
      .dot-red { background: #ef4444; }
      .dot-yellow { background: #eab308; }
      .dot-gray { background: #555; }
      .status-label {
        font-size: 13px;
        color: #ccc;
      }

      /* Log section */
      #log-section { margin-top: 12px; }
      #log-list {
        max-height: 50vh;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        line-height: 1.6;
        color: #888;
        background: #111;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .log-entry { border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
      .log-time { color: #555; }
      .log-action { color: #7dd3fc; }
      .log-detail { color: #aaa; }
    </style>
  </head>
  <body>
    <h1>G2 Media Controller <span id="version" style="font-size:11px;color:#555;font-weight:400;"></span></h1>

    <div id="status-section">
      <h2>Status</h2>
      <div class="status-row" id="status-glasses">
        <span class="status-dot dot-gray" id="dot-glasses"></span>
        <span class="status-label" id="label-glasses">Glasses: waiting...</span>
      </div>
    </div>

    <div id="log-section">
      <h2>Action Log</h2>
      <div id="log-list"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
